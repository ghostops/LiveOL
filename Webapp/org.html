<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LiveOL Organization</title>

  <script src="https://unpkg.com/axios/dist/axios.min.js"></script>
  <script src="app.js"></script>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <h1>Organization:</h1>
  <div id="org-details"></div>
  <div id="org-competitions"></div>

  <script>
    async function loadOrg() {
        const id = window.location.hash.slice(1);
        const data = await window.fetchData(`v2/organizations/${id}`);

        const org = data.data.organization;

        const listItems = [
            org?.eventorId ? `<li><strong>Eventor ID:</strong> ${org.eventorId}</li>` : '',
            org?.eventorName ? `<li><strong>Eventor Name:</strong> ${org.eventorName}</li>` : '',
            org?.liveName ? `<li><strong>Live Name:</strong> ${org.liveName}</li>` : '',
            org?.logoPath ? `<li><strong>Logo:</strong> <img src="${org.logoPath}" alt="Logo" style="max-width:100px;max-height:100px;"></li>` : '',
            org?.createdAt ? `<li><strong>Created At:</strong> ${new Date(org.createdAt).toLocaleString('sv')}</li>` : '',
            org?.updatedAt ? `<li><strong>Updated At:</strong> ${new Date(org.updatedAt).toLocaleString('sv')}</li>` : ''
        ];

        const ul = document.createElement('ul');
        ul.innerHTML = listItems.join('');
        document.getElementById('org-details').appendChild(ul);
    }

    async function loadOrgComps() {
      const id = window.location.hash.slice(1);
      const data = await window.fetchData(`v2/organizations/${id}/competitions`);
      const competitions = data.data.competitions;

      if (competitions && competitions.length > 0) {
        const table = document.createElement('table');
        table.style.borderCollapse = 'collapse';
        table.style.width = '100%';

        // Table header
        const thead = document.createElement('thead');
        thead.innerHTML = `
          <tr>
            <th>Eventor Name</th>
            <th>Organizer</th>
            <th>Date</th>
            <th>Links</th>
            <th>Live Name</th>
            <th>Live Organizer</th>
            <th>Live Date</th>
            <th>Is Public</th>
          </tr>
        `;
        table.appendChild(thead);

        // Table body
        const tbody = document.createElement('tbody');
        competitions.forEach(comp => {
          const eventor = comp.eventor || {};
          const live = comp.live || {};

          // Safely handle links array
          const links = Array.isArray(eventor.links)
            ? eventor.links.map(link =>
          `<a href="${link.href}" target="_blank" rel="noopener">${link.text}</a>`
              ).join('<br>')
            : '';

          const eventorDate = eventor.date ? new Date(eventor.date).toLocaleString('sv') : '';
          const liveDate = live.date ? new Date(live.date).toLocaleString('sv') : '';
          const isPublic = typeof live.isPublic === 'boolean' ? (live.isPublic ? 'Yes' : 'No') : '';

          const row = document.createElement('tr');
          row.innerHTML = `
            <td>
              ${eventor.name
          ? `<a href="comp.html#${comp.id}" target="_blank" rel="noopener">${eventor.name}</a>`
          : ''}
            </td>
            <td>${eventor.organizer || ''}</td>
            <td>${eventorDate}</td>
            <td>${links}</td>
            <td>${live.name || ''}</td>
            <td>${live.organizer || ''}</td>
            <td>${liveDate}</td>
            <td>${isPublic}</td>
          `;
          tbody.appendChild(row);
        });
        table.appendChild(tbody);

        document.getElementById('org-competitions').appendChild(table);
      } else {
        const msg = document.createElement('p');
        msg.textContent = 'No competitions found.';
        document.getElementById('org-competitions').appendChild(msg);
      }
    }

    loadOrg();
    loadOrgComps();
  </script>
</body>
</html>
