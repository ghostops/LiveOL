<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LiveOL Web App</title>

  <script src="https://unpkg.com/axios/dist/axios.min.js"></script>
  <script src="app.js"></script>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <script>
    async function fetchCompetitions() {
      const data = await window.fetchData('v2/competitions');
      
      if (data && data.status === "success" && data.data && Array.isArray(data.data.competitions)) {
        const competitions = data.data.competitions;
        const table = document.createElement('table');
        table.style.borderCollapse = 'collapse';
        table.style.width = '100%';

        // Table header
        const thead = document.createElement('thead');
        const headerRow = document.createElement('tr');
        [
          'ID', 'Eventor ID', 'Eventor Name', 'Organizer', 'OL Organizer ID', 'Status', 'Date',
          'Distance', 'Punch System', 'Lat', 'Lng', 'Notification', 'Links', 'Created At', 'Updated At',
          'Live ID', 'Live Name', 'Live Organizer', 'Live OL Organizer ID', 'Live Date', 'Live Public', 'Live Created At', 'Live Updated At'
        ].forEach(text => {
          const th = document.createElement('th');
          th.textContent = text;
          headerRow.appendChild(th);
        });
        thead.appendChild(headerRow);
        table.appendChild(thead);

        // Table body
        const tbody = document.createElement('tbody');
        competitions.forEach(comp => {
          const eventor = comp.eventor || {};
          const live = comp.live || {};

          const row = document.createElement('tr');

          // ID
            const idCell = document.createElement('td');
            const idLink = document.createElement('a');
            idLink.href = `comp.html#${comp.id}`;
            idLink.textContent = comp.id ?? '';
            idLink.target = '_blank';
            idCell.appendChild(idLink);
            row.appendChild(idCell);

          // Eventor ID
          const eventorIdCell = document.createElement('td');
          eventorIdCell.textContent = eventor.id ?? '';
          row.appendChild(eventorIdCell);

          // Eventor Name
          const nameCell = document.createElement('td');
          nameCell.textContent = eventor.name ?? '';
          row.appendChild(nameCell);

          // Organizer
          const orgCell = document.createElement('td');
          orgCell.textContent = eventor.organizer ?? '';
          row.appendChild(orgCell);

          // OL Organizer ID
          const olOrgIdCell = document.createElement('td');
          olOrgIdCell.textContent = eventor.olOrganizerId ?? '';
          row.appendChild(olOrgIdCell);

          // Status
          const statusCell = document.createElement('td');
          statusCell.textContent = eventor.status ?? '';
          row.appendChild(statusCell);

          // Date
          const dateCell = document.createElement('td');
          dateCell.textContent = eventor.date ? new Date(eventor.date).toLocaleString('sv') : '';
          row.appendChild(dateCell);

          // Distance
          const distanceCell = document.createElement('td');
          distanceCell.textContent = eventor.distance ?? '';
          row.appendChild(distanceCell);

          // Punch System
          const punchSystemCell = document.createElement('td');
          punchSystemCell.textContent = eventor.punchSystem ?? '';
          row.appendChild(punchSystemCell);

          // Lat
          const latCell = document.createElement('td');
          latCell.textContent = eventor.lat ?? '';
          row.appendChild(latCell);

          // Lng
          const lngCell = document.createElement('td');
          lngCell.textContent = eventor.lng ?? '';
          row.appendChild(lngCell);

          // Notification
          const notifCell = document.createElement('td');
          notifCell.innerHTML = eventor.notification ?? '';
          row.appendChild(notifCell);

          // Links
          const linksCell = document.createElement('td');
          if (Array.isArray(eventor.links)) {
        linksCell.innerHTML = eventor.links.map(link =>
          `<a href="${link.href}" target="_blank">${link.text}</a>`
        ).join('<br>');
          }
          row.appendChild(linksCell);

          // Created At
          const createdAtCell = document.createElement('td');
          createdAtCell.textContent = eventor.createdAt ? new Date(eventor.createdAt).toLocaleString('sv') : '';
          row.appendChild(createdAtCell);

          // Updated At
          const updatedAtCell = document.createElement('td');
          updatedAtCell.textContent = eventor.updatedAt ? new Date(eventor.updatedAt).toLocaleString('sv') : '';
          row.appendChild(updatedAtCell);

          // Live ID
          const liveIdCell = document.createElement('td');
          liveIdCell.textContent = live.id ?? '';
          row.appendChild(liveIdCell);

          // Live Name
          const liveNameCell = document.createElement('td');
          liveNameCell.textContent = live.name ?? '';
          row.appendChild(liveNameCell);

          // Live Organizer
          const liveOrgCell = document.createElement('td');
          liveOrgCell.textContent = live.organizer ?? '';
          row.appendChild(liveOrgCell);

          // Live OL Organizer ID
            const liveOlOrgIdCell = document.createElement('td');
            if (live.olOrganizerId) {
            const liveOlOrgLink = document.createElement('a');
            liveOlOrgLink.href = `org.html#${live.olOrganizerId}`;
            liveOlOrgLink.textContent = live.olOrganizerId;
            liveOlOrgLink.target = '_blank';
            liveOlOrgIdCell.appendChild(liveOlOrgLink);
            } else {
            liveOlOrgIdCell.textContent = '';
            }
            row.appendChild(liveOlOrgIdCell);

          // Live Date
          const liveDateCell = document.createElement('td');
          liveDateCell.textContent = live.date ? new Date(live.date).toLocaleString('sv') : '';
          row.appendChild(liveDateCell);

          // Live Public
          const livePublicCell = document.createElement('td');
          livePublicCell.textContent = live.isPublic ?? '';
          row.appendChild(livePublicCell);

          // Live Created At
          const liveCreatedAtCell = document.createElement('td');
          liveCreatedAtCell.textContent = live.createdAt ? new Date(live.createdAt).toLocaleString('sv') : '';
          row.appendChild(liveCreatedAtCell);

          // Live Updated At
          const liveUpdatedAtCell = document.createElement('td');
          liveUpdatedAtCell.textContent = live.updatedAt ? new Date(live.updatedAt).toLocaleString('sv') : '';
          row.appendChild(liveUpdatedAtCell);

          tbody.appendChild(row);
        });
        table.appendChild(tbody);

        document.body.appendChild(table);
      }
    }

    fetchCompetitions();
  </script>
  
</body>
</html>
