<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LiveOL Competition</title>

  <script src="https://unpkg.com/axios/dist/axios.min.js"></script>
  <script src="app.js"></script>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <script>

    async function loadComp() {
        const id = window.location.hash.slice(1);
        const data = await window.fetchData(`v2/competitions/${id}`);

        const comp = data.data.competition;
        const eventor = comp.eventor;
        const live = comp.live;

        const listItems = [
            eventor?.name ? `<li><strong>Event Name:</strong> ${eventor.name}</li>` : '',
            eventor?.organizer ? `<li><strong>Organizer:</strong> <a href="org.html#${eventor?.olOrganizerId}" target="_blank">${eventor.organizer}</a></li>` : '',
            eventor?.date ? `<li><strong>Date:</strong> ${new Date(eventor.date).toLocaleString()}</li>` : '',
            live?.name ? `<li><strong>Live Name:</strong> ${live.name}</li>` : '',
            live?.organizer ? `<li><strong>Live Organizer:</strong> ${live.organizer}</li>` : '',
            eventor?.links?.length ? `<li><strong>Links:</strong><ul>${
            eventor.links.map(link =>
              `<li><a href="${link?.href ?? '#'}" target="_blank">${link?.text ?? 'Link'}</a></li>`
            ).join('')
            }</ul></li>` : ''
        ];

        const ul = document.createElement('ul');
        ul.innerHTML = listItems.join('');
        document.body.appendChild(ul);
    }

    loadComp();
  </script>
</body>
</html>
